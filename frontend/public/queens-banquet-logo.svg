      stroke-width="9"
      stroke-linecap="round"
      stroke-linejoin="round"
    />
    <circle cx="320" cy="184" r="13" fill="url(#gold)" />
    <circle cx="262" cy="180" r="10" fill="url(#gold)" />
    <circle cx="378" cy="180" r="10" fill="url(#gold)" />
    <path d="M238 281h164" stroke="url(#gold)" stroke-width="12" stroke-linecap="round" />
    <path d="M258 302h124" stroke="url(#gold)" stroke-width="5" stroke-linecap="round" />
