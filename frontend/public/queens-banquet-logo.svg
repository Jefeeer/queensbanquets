<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 640" role="img" aria-labelledby="title desc">
  <title id="title">Queen's Banquet Events logo</title>
  <desc id="desc">Circular black and gold Queen's Banquet Events emblem with crown and script-style lettering.</desc>
  <defs>
    <linearGradient id="gold" x1="120" y1="80" x2="520" y2="560" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#ffe7a5" />
      <stop offset="0.36" stop-color="#d9a642" />
      <stop offset="0.68" stop-color="#fff0ad" />
      <stop offset="1" stop-color="#b97816" />
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="38%" r="58%">
      <stop offset="0" stop-color="#4c3211" stop-opacity="0.5" />
      <stop offset="1" stop-color="#050403" stop-opacity="0" />
    </radialGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="6" stdDeviation="8" flood-color="#000000" flood-opacity="0.45" />
    </filter>
  </defs>

  <circle cx="320" cy="320" r="306" fill="#050403" />
  <circle cx="320" cy="320" r="288" fill="none" stroke="url(#gold)" stroke-width="20" />
  <circle cx="320" cy="320" r="260" fill="url(#glow)" stroke="#17110a" stroke-width="2" />

  <g filter="url(#softShadow)">
    <path
      d="M244 221h152l18 58H226l18-58Z"
      fill="none"
