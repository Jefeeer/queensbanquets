# Render blueprint for Queen's Banquet API
# https://render.com/docs/blueprint-spec
#
# In Render: New → Blueprint → connect this repo → apply.

services:
  - type: web
    name: queens-banquet-api
    runtime: node
    plan: free
    region: singapore
    rootDir: .
    buildCommand: npm install
    startCommand: npm run start --workspace api
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "4000"
      - key: DATABASE_SSL
        value: "true"
      - key: DATABASE_URL
        sync: false
      - key: ADMIN_JWT_SECRET
        generateValue: true
      - key: ADMIN_EMAIL
        value: queensbanquet07@gmail.com
      - key: ADMIN_PASSWORD
        sync: false
      - key: ADMIN_NAME
        value: Marou Madrid
      - key: CORS_ORIGIN
        sync: false
